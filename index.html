<!DOCTYPE html>
<html>
<head>
<title>Secret Puzzle Message</title>
<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:400px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:80%;
margin:10px;
}

button{
padding:10px 20px;
background:#ff4081;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Solve the Puzzle</h2>

<p>What is 7 + 8 ?</p>

<input id="answer" placeholder="Enter Answer">

<br>

<button onclick="checkAnswer()">Submit</button>

<p id="message" class="hidden">
❤️ Surprise Message ❤️  
You are very special to me.
</p>

</div>

<script>

function checkAnswer(){

let ans=document.getElementById("answer").value;

if(ans=="15"){
document.getElementById("message").classList.remove("hidden");
}else{
alert("Wrong Answer. Try again.");
}

}

</script>

</body>
</html>
